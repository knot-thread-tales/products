<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Knot & Thread Tales</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E🧶%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

  <!-- ── Login ─────────────────────────────────── -->
  <div id="loginScreen" class="admin-login">
    <form id="loginForm" class="admin-login__card">
      <h1>🧶 Knot & Thread Tales</h1>
      <p>Admin sign in</p>
      <input type="email" id="loginEmail" placeholder="Email" required autocomplete="username">
      <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="btn btn--primary w-full">Sign In</button>
      <p id="loginError" class="admin-login__error" hidden></p>
      <p class="admin-login__note">No public sign-up — accounts are created in the Supabase Dashboard under Authentication → Users.</p>
    </form>
  </div>

  <!-- ── Dashboard ─────────────────────────────── -->
  <div id="dashboard" class="admin-dash" hidden>
    <button id="menuToggle" class="admin-menu-toggle" aria-label="Toggle menu">☰</button>
    <aside class="admin-sidebar">
      <div class="admin-sidebar__brand">
        <span>🧶 KTT Admin</span>
        <button id="sidebarClose" class="admin-sidebar__close" aria-label="Close menu">✕</button>
      </div>
      <nav id="adminNav" class="admin-sidebar__nav">
        <button data-view="products" class="admin-nav-btn active"><span>📦</span> Products</button>
        <button data-view="announcements" class="admin-nav-btn"><span>📣</span> Announcements</button>
        <button data-view="orders" class="admin-nav-btn"><span>🧾</span> Orders</button>
        <button data-view="reviews" class="admin-nav-btn"><span>⭐</span> Reviews</button>
        <button data-view="categories" class="admin-nav-btn"><span>🗂️</span> Categories</button>
        <button data-view="faqs" class="admin-nav-btn"><span>❓</span> FAQs</button>
        <button data-view="testimonials" class="admin-nav-btn"><span>💬</span> Testimonials</button>
        <button data-view="payment_settings" class="admin-nav-btn"><span>💳</span> Payment Settings</button>
      </nav>
      <button id="logoutBtn" class="admin-sidebar__logout">⏻ Sign Out</button>
    </aside>
    <div id="sidebarBackdrop" class="admin-sidebar-backdrop"></div>

    <main class="admin-main">
      <header class="admin-main__header">
        <h1 id="viewTitle">Products</h1>
        <button id="addBtn" class="btn btn--primary btn--sm">+ Add</button>
      </header>
      <div id="viewBody" class="admin-view-body"></div>
    </main>
  </div>

  <!-- ── Record Editor Modal ───────────────────── -->
  <div id="recordModal" class="admin-modal" hidden>
    <div class="admin-modal__card">
      <button id="recordModalClose" class="admin-modal__close" aria-label="Close">&times;</button>
      <h2 id="recordModalTitle">Edit</h2>
      <form id="recordForm"></form>
    </div>
  </div>

  <!-- ── Product Images Manager Modal ──────────── -->
  <div id="imagesModal" class="admin-modal" hidden>
    <div class="admin-modal__card admin-modal__card--wide">
      <button id="imagesModalClose" class="admin-modal__close" aria-label="Close">&times;</button>
      <h2 id="imagesModalTitle">Product Images</h2>
      <div id="imagesList" class="admin-images-list"></div>
      <form id="imageUploadForm" class="admin-image-upload">
        <input type="file" id="imageFileInput" accept="image/*" required>
        <input type="text" id="imageAltInput" placeholder="Alt text (e.g. Front view)">
        <button type="submit" class="btn btn--primary btn--sm">Upload</button>
      </form>
      <p class="admin-note">Or paste an external image URL (Google Drive, etc.) instead of uploading:</p>
      <form id="imageUrlForm" class="admin-image-upload">
        <input type="url" id="imageUrlInput" placeholder="https://…" required>
        <input type="text" id="imageUrlAltInput" placeholder="Alt text">
        <button type="submit" class="btn btn--outline btn--sm">Add URL</button>
      </form>
    </div>
  </div>

  <div id="adminToastHost"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
